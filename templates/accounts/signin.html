{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - E-Medcare Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/accounts/accounts.css' %}">
</head>
<body>
    <div id="preloader">
        <div class="loader-content text-center">
            <div class="logo-wrapper">
                <div class="orbit"></div>
                <div class="main-logo"><i class="fas fa-heartbeat"></i></div>
            </div>
            <h2 class="splash-text">AI-Powered E-Medcare</h2>
            <p class="splash-subtext">Welcome Our Health Systems</p>
        </div>
    </div>

    <div class="login-card" id="loginCard">
        <div class="icon-box"><i class="fas fa-heartbeat"></i></div>
        <h2>Sign In</h2>
        <p class="subtitle">Welcome back! Please enter your details.</p>
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="name@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-signin">Access Portal</button>
        </form>
        <p class="footer-text">Don't have an account? <a href="{% url 'signup' %}">Create One</a></p>
    </div>

     <script>
        window.addEventListener("load", function () {
            const loader = document.getElementById("preloader");
            const loginCard = document.getElementById("loginCard");

            if (sessionStorage.getItem("hasSeenLoader")) {
                loader.style.display = "none";
                loginCard.classList.add("card-reveal");
            } else {
                setTimeout(() => {
                    loader.classList.add("loader-hidden");
                    sessionStorage.setItem("hasSeenLoader", "true");
                    setTimeout(() => { loginCard.classList.add("card-reveal"); }, 500);
                }, 4000);
            }
        });
    </script> 

    {% comment %} <script>
    window.addEventListener("load", function () {
        const loader = document.getElementById("preloader");
        const loginCard = document.getElementById("loginCard");

        setTimeout(() => {
            loader.classList.add("loader-hidden");

            setTimeout(() => {
                loginCard.classList.add("card-reveal");
            }, 500);

        }, 4000);
    });
</script> {% endcomment %}
</body>
</html>
