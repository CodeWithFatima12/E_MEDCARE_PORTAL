{% extends 'base.html' %}
{% load static %}

{% block title %}AI Health Monitor - E-Medcare{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/ai_module/DietForm.css' %}">
{% endblock %}

{% block content %}
<!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"> -->
<div class="container mb-5">
    <div class="main-card card bg-white">
        <div class="header-banner">
            <h1>Smart Diet Planner</h1>
            <!-- <p class="mb-0 opacity-75">Advanced AI Dietary Analysis</p> -->
        </div>

        <div class="card-body p-4 p-md-5">
            <form method="post">
                {% csrf_token %}
                <div class="row g-4">
                    {% for field in form %}
                    <div class="col-12 col-lg-4">
                        <label class="form-label">{{ field.label }}</label>
                        {{ field }}
                    </div>
                    {% endfor %}
                </div>
                <button type="submit" class="btn btn-generate btn-primary btn-lg w-100 mt-4 shadow-sm">
                    Generate Diet Plan
                </button>
            </form>


        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    {% endblock %}

    {% block extra_js %}
    {% endblock %}
