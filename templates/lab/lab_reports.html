{% extends 'base.html' %}
{% load static %}

{% block title %}Lab - E-Medcare{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/lab/lab_report.css' %}">
 
{% endblock %}
{% block content %}

<div class="container-fluid p-0">
    
  <div class="container py-2">
    <div class="text-center mb-4 mt-3">
        <h2 class="fw-bold" style="color: rgb(33, 32, 95);">Lab Reports & Tests</h2>
        <p class="text-muted">Select from our wide range of professional lab diagnostic services.</p>
    </div>

    <div class="test-grid" id="test-container">
        
        
</div>

{% endblock %}

{% block extra_js %}
<!-- Libraries Include (jQuery and SweetAlert) -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    // 1. Fetching Lab Tests from API
    fetch('/api/lab/lab-reports/?json=1', {
        headers: {
            'x-requested-with': 'XMLHttpRequest'
        }
    })
    .then(response => response.json())
    .then(data => {
        let container = document.getElementById('test-container');
        container.innerHTML = ""; // Container clear karein

        data.tests.forEach(test => {
            container.innerHTML += `
                <div class="test-card">
                    <div class="test-header">
                        <span class="icon">🔬</span>
                        <div class="price">Rs. ${test.price}</div>
                    </div>
                    <h3 class="test-name">${test.name}</h3>
                    <p class="test-desc">${test.description}</p>
                    ${test.instructions ? `
                    <div class="test-instructions">
                        <strong>Instruction:</strong> ${test.instructions}
                    </div>` : ''}
                    <a href="/api/lab/book-test/${test.id}/" class="btn-book" style="text-decoration:none; display:inline-block; text-align:center;">
                        Book Slot
                    </a>
                </div>
            `;
        });
    })
    .catch(error => console.error('Error fetching tests:', error));

    // 2. Handling Role Restrictions (Django Messages to SweetAlert)
    {% if messages %}
        {% for message in messages %}
            {% if 'restriction_error' in message.tags %}
                Swal.fire({
                    icon: 'error',
                    title: 'Access Denied',
                    text: "{{ message|escapejs }}",
                    confirmButtonColor: '#21205f'
                });
            {% endif %}
        {% endfor %}
    {% endif %}
</script>
{% endblock %}
