<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Success | E-Medcare Portal</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .success-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: #1a123c;
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            margin: 0 auto 20px;
            animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s both;
        }

        @keyframes scaleIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }

        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .order-details {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 30px;
            border-left: 5px solid #13183f;
        }

        .btn-home {
            background: #180a33;
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.3s;
            display: inline-block;
        }

        .btn-home:hover {
            background: #3a0e79;
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
            transform: translateY(-2px);
        }

        .footer-logo {
            margin-top: 40px;
            color: #004a99;
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="icon-circle">
            <i class="fas fa-check"></i>
        </div>
        
        <h1>Order Placed Successfully!</h1>
        <p>Thank you for choosing E-Medcare. Your health is our priority. We have received your order and our team is preparing it for delivery.</p>

        <div class="order-details">
            <strong>Estimated Delivery:</strong><b>One Day</b><br>
            <small>You will receive a confirmation call shortly.</small>
        </div>

        <a href="{% url 'homepage' %}" class="btn-home">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>

        <div class="footer-logo">
            <i class="fas fa-heartbeat"></i> E-Medcare Portal
        </div>
    </div>

</body>
</html>
