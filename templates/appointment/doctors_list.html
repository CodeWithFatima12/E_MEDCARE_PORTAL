{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/appointment/doctor_list.css' %}">
{% endblock %}

{% block content %}
<div class="app-container mb-4">
    <div class="container">
        <div class="banner-card">
            <h2 id="dept-title">Loading...</h2>
        </div>

        <div id="doctor-grid" class="row g-4">
            </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
$(document).ready(function() {
    const urlParams = new URLSearchParams(window.location.search);
    const deptId = urlParams.get('dept_id');
     
    $.ajax({
        url: "/api/appointment/doctors-api/",
        method: "GET",
        data: { 'dept_id': deptId },
        success: function(response) {
            $('#dept-title').text(response.department_name);
            let html = '';
            
            if(response.doctors.length > 0) {
                response.doctors.forEach(doc => {
                    // doc.id asli database ID hai (1, 2, 3 etc.)
                    html += `
                    <div class="col-md-4">
                        <div class="doctor-card">
                            <div>
                                <div class="doc-img-wrapper">
                                    <img src="${doc.profile_image}" onerror="this.src='/static/images/doctors/default.png'">
                                </div>
                                <div class="doc-name">${doc.name}</div>
                                <div class="doc-dept">${doc.department_name}</div>
                            </div>
                            
                            <div class="btn-actions">
                                <a href="/api/appointment/profile/${doc.id}/" class="btn-profile">View Profile</a>
                                <a href="/api/appointment/book/${doc.id}/" class="btn-book">Book Now</a>
                            </div>
                        </div>
                    </div>`;
                });
            } else {
                html = '<div class="col-12 text-center py-5"><h3>No specialists found.</h3></div>';
            }
            $('#doctor-grid').html(html);
        }
    });
});
</script>
{% endblock %}
