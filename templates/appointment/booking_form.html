{% extends 'base.html' %} 
{% load static %} 
{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/appointment/booking_form.css' %}">

{% endblock %} 
{% block content %}
<div class="container">
  <div class="banner-card"><h2>Confirm Your Appointment</h2></div>
  <div class="booking-card mx-auto" style="max-width: 850px">
    <form id="bookingForm">
      {% csrf_token %}
      <input type="hidden" id="doctorId" value="{{ doctor.id }}" />
      <input
        type="hidden"
        id="actualFee"
        value="{{ doctor.consultation_fee }}"
      />

      <div class="row g-4">
        <!-- Full Name Field -->
        <div class="col-md-6">
          <label class="form-label"
            >Full Name <span class="required-dot">*</span></label
          >
          <input
            type="text"
            id="patientFullName"
            class="form-control"
            placeholder="Enter your full name"
            required
          />
        </div>

        <!-- Age Field -->
        <div class="col-md-3">
          <label class="form-label"
            >Age <span class="required-dot">*</span></label
          >
          <input
            type="number"
            id="patientAge"
            class="form-control"
            placeholder="Age"
            min="1"
            max="120"
            required
          />
        </div>

       
        <!-- Gender Field -->
        <div class="col-md-3">
          <label class="form-label"
            >Gender <span class="required-dot">*</span></label
          >
          <select id="patientGender" class="form-select" required>
            <option value="">-- Select Gender --</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <!-- Phone Number Field -->
        <div class="col-md-6">
          <label class="form-label"
            >Phone Number <span class="required-dot">*</span></label
          >
          <input
            type="tel"
            id="patientPhone"
            class="form-control"
            placeholder="10-digit mobile number"
            pattern="[0-9]{10}"
            required
          />
          <small class="text-muted">Enter 10-digit mobile number</small>
        </div>

        <!-- Doctor Field (Read-only) -->
        <div class="col-md-6">
          <label class="form-label">Doctor</label>
          <input
            type="text"
            class="form-control bg-light"
            value="Dr. {{ doctor.user.get_full_name }}"
            readonly
          />
        </div>

       

        <!-- Select Day -->
        <div class="col-md-12">
          <label class="form-label"
            >1. Select Appointment Day
            <span class="required-dot">*</span></label
          >
          <select id="daySelect" class="form-select" required>
            <option value="">-- Choose Day --</option>
            {% for day in available_days %}
            <option value="{{ day.day_of_week }}">
              {{ day.get_day_of_week_display }}
            </option>
            {% endfor %}
          </select>
        </div>

        <!-- Select Time Slot -->
        <div class="col-md-12">
          <label class="form-label"
            >2. Select Time Slot (AM/PM) <span class="required-dot">*</span>
            <span id="displayDate" class="text-success ms-2"></span
          ></label>
          <div
            id="slotsContainer"
            class="d-flex flex-wrap gap-2 p-3 border rounded bg-light"
          >
            <small class="text-muted"
              >Select a day to see available times.</small
            >
          </div>
        </div>
        <!-- Consultation Fee (Read-only) -->
        <div class="col-md-3">
          <label class="form-label">Consultation Fee</label>
          <input
            type="text"
            class="form-control bg-light fw-bold text-primary"
            value="Rs. {{ doctor.consultation_fee }}"
            readonly
          />
        </div>

        <!-- Amount to Pay -->
        <div class="col-md-3">
          <label class="form-label"
            >Enter Amount to Pay <span class="required-dot">*</span></label
          >
          <input
            type="number"
            id="userPaidFee"
            class="form-control"
            placeholder="Enter fee"
            required
          />
        </div>

        <!-- Appointment Type -->
        <div class="col-md-6">
          <label class="form-label"
            >Appointment Type <span class="required-dot">*</span></label
          >
          <select id="appType" class="form-select" required>
            <option value="in_hospital">In-Hospital (Physical)</option>
            <option value="online">Online Consultation (Video)</option>
          </select>
        </div>

        <!-- Medical History -->
        <div class="col-md-12">
          <label class="form-label"
            >Medical History / Symptoms
            <span class="required-dot">*</span></label
          >
          <textarea
            id="history"
            class="form-control"
            rows="3"
            placeholder="Describe your health issue..."
            required
          ></textarea>
        </div>
      </div>

      <button type="submit" class="btn-confirm">
        Confirm & Book Appointment
      </button>
    </form>
  </div>
</div>
{% endblock %} {% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
  let selectedStartTime = null;
  let bookingDate = null;

  $("#daySelect").change(function () {
    const day = $(this).val();
    const docId = $("#doctorId").val();
    if (!day) {
      $("#slotsContainer").html("");
      return;
    }

    $.get(
      `/api/appointment/get-slots/`,
      { doctor_id: docId, day: day },
      function (data) {
        bookingDate = data.raw_date;
        $("#displayDate").text("Date: " + data.formatted_date);
        let html =
          data.slots.length > 0
            ? ""
            : '<p class="text-danger fw-bold">All slots booked for this day.</p>';

        data.slots.forEach((s) => {
          html += `<div class="slot-btn" data-value="${s.value}">${s.display}</div>`;
        });
        $("#slotsContainer").html(html);
        selectedStartTime = null;
      },
    );
  });

  $(document).on("click", ".slot-btn", function () {
    $(".slot-btn").removeClass("active");
    $(this).addClass("active");
    selectedStartTime = $(this).data("value");
  });

  $("#bookingForm").submit(function (e) {
    e.preventDefault();

    // New field validations
    const patientFullName = $("#patientFullName").val().trim();
    const patientAge = $("#patientAge").val();
    const patientGender = $("#patientGender").val();

    const patientPhone = $("#patientPhone").val().trim();

    if (!patientFullName) {
      Swal.fire("Error", "Please enter your full name", "error");
      return;
    }
    if (!patientAge || patientAge < 1 || patientAge > 120) {
      Swal.fire("Error", "Please enter a valid age (1-120)", "error");
      return;
    }
    if (!patientGender) {
      Swal.fire("Error", "Please select your gender", "error");
      return;
    }
    if (!patientPhone || !/^\d{10}$/.test(patientPhone)) {
      Swal.fire("Error", "Please enter a valid 10-digit phone number", "error");
      return;
    }

    const actualFee = parseFloat($("#actualFee").val());
    const userPaid = parseFloat($("#userPaidFee").val());

    if (isNaN(userPaid)) {
      Swal.fire("Error", "Please enter valid amount.", "error");
      return;
    }

    // Fee Check
    if (userPaid !== actualFee) {
      Swal.fire(
        "Payment Error",
        `Minimum fee for this doctor is Rs. ${actualFee}. Please enter the correct amount.`,
        "error",
      );
      return;
    }

    // Slot Check
    if (!selectedStartTime) {
      Swal.fire("Missing Information", "Please select a time slot.", "warning");
      return;
    }

    const payload = {
      doctor_id: $("#doctorId").val(),
      date: bookingDate,
      start_time: selectedStartTime,
      appointment_type: $("#appType").val(),
      medical_history: $("#history").val(),
      paid_amount: userPaid,
      // New fields
      patient_name: patientFullName,
      phone_number: patientPhone,
      age: patientAge,
      gender: patientGender,
    };

    $.ajax({
      url: "/api/appointment/confirm-booking/",
      method: "POST",
      headers: { "X-CSRFToken": "{{ csrf_token }}" },
      data: JSON.stringify(payload),
      contentType: "application/json",
      success: function () {
        Swal.fire({
          icon: "success",
          title: "Success!",
          text: "Appointment booked successfully.",
        }).then(() => {
          window.location.href = "/profile";
        });
      },
      error: function (xhr) {
        let msg =
          xhr.responseJSON && xhr.responseJSON.message
            ? xhr.responseJSON.message
            : "Something went wrong.";
        Swal.fire("Failed", msg, "error");
      },
    });
  });
</script>
{% endblock %}
